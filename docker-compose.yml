version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: librainDB
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: 1234
    volumes:
      - mongo_data:/data/db

  ollama:
    image: ollama/ollama:latest
    container_name: librainOllama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-init:
    image: ollama/ollama:latest
    container_name: librainOllamaInit
    depends_on:
      - ollama
    restart: "no"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-lc"]
    command: >
      until ollama list >/dev/null 2>&1; do sleep 1; done;
      ollama pull llama3.2:3b-instruct

volumes:
  mongo_data:
  ollama_data: