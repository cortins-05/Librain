services:
  mongodb:
    image: mongo:7
    container_name: librainDB
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: 1234
    volumes:
      - mongo_data:/data/db

  ollama:
    image: ollama/ollama:latest
    container_name: librainOllama
    restart: always
    tty: true
    stdin_open: true
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 3s
      retries: 30

  ollama-pull:
    image: ollama/ollama:latest
    container_name: librainOllamaPull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: []
    command:
      - sh
      - -lc
      - >
        set -e;
        echo "[ollama-pull] descargando qwen2.5:0.5b-instruct...";
        ollama pull qwen2.5:0.5b-instruct;
        echo "[ollama-pull] ok";
    restart: "no"

volumes:
  mongo_data:
  ollama_data: